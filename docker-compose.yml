version: '3.8'
services:
  arias-web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    volumes:
      # Archivos grandes (memorias, PDFs) — copiar al servidor con:
      # scp -r ./src/assets/memorias* user@servidor:/opt/arias/assets/
      - /opt/arias/assets:/app/dist/arias2024/browser/assets/memorias
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/"]
      interval: 30s
      timeout: 10s
      retries: 3
